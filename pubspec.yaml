name: booksale
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7
dependencies:
  google_maps_flutter: ^2.17.1
  flutter_map: ^8.3.0
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  intl: ^0.20.2
  flutter_secure_storage: ^10.2.0
  flutter:
    sdk: flutter
  hive: ^2.2.3
  image_picker: ^1.2.2
  cached_network_image: ^3.3.1
  hive_flutter: ^1.1.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  dotted_border: ^3.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

dependency_overrides:
  path_provider_foundation: 2.4.0
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
  fonts:
    - family: Newsreader
      fonts:
        - asset: assets/fonts/Newsreader_60pt-Regular.ttf
        - asset: assets/fonts/Newsreader_60pt-Bold.ttf
          weight: 700